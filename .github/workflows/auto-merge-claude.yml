name: Auto-merge claude/* branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Merge into main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff "$GITHUB_REF_NAME" -m "Auto-merge $GITHUB_REF_NAME into main"
          git push origin main

  # Deploy right after merge (since bot commits don't trigger other workflows)
  build:
    needs: auto-merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pfotenwelt/package-lock.json

      - name: Install dependencies
        working-directory: pfotenwelt
        run: npm ci

      - name: Build
        working-directory: pfotenwelt
        run: npx vite build --base /Claude-Code-Handy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pfotenwelt/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
