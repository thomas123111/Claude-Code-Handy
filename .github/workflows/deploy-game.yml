name: Deploy Pfotenwelt to GitHub Pages

on:
  # Deploy when auto-merge workflow completes (workaround: bot commits don't trigger push events)
  workflow_run:
    workflows: ["Auto-merge claude/* branches"]
    types: [completed]
  # Also deploy on direct pushes to main or manual trigger
  push:
    branches: ['main']
    paths:
      - 'pfotenwelt/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    # Skip if triggered by workflow_run that failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pfotenwelt/package-lock.json

      - name: Install dependencies
        working-directory: pfotenwelt
        run: npm ci

      - name: Build
        working-directory: pfotenwelt
        run: npx vite build --base /Claude-Code-Handy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pfotenwelt/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
