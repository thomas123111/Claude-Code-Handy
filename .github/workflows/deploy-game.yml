name: Deploy Game to GitHub Pages

on:
  push:
    branches: ['claude/mobile-arena-game-DZAAt', 'main']
    paths:
      - 'mobile-arena-game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:
  # Auto-deploys from feature branch and main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-arena-game/package-lock.json

      - name: Install dependencies
        working-directory: mobile-arena-game
        run: npm ci

      - name: Build
        working-directory: mobile-arena-game
        run: npx vite build --base /Claude-Code-Handy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile-arena-game/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
