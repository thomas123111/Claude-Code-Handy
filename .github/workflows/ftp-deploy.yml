name: FTP Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  detect-changes:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.find-sites.outputs.sites }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed site folders
        id: find-sites
        run: |
          # Get all changed docs/ subdirectories (top-level = domain folders)
          SITES=$(git diff --name-only HEAD~1 HEAD \
            | grep '^docs/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=$SITES" >> $GITHUB_OUTPUT
          echo "Changed sites: $SITES"

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect-changes
    if: needs.detect-changes.outputs.sites != '[]' && needs.detect-changes.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.sites) }}
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.site }} via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./docs/${{ matrix.site }}/
          server-dir: /${{ matrix.site }}/
          dangerous-clean-slate: false
          protocol: ftps
          port: 21
