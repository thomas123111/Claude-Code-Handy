name: FTP Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  detect-changes:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.find-sites.outputs.sites }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed site folders
        id: find-sites
        run: |
          # Get all changed docs/ subdirectories (top-level = domain folders)
          SITES=$(git diff --name-only HEAD~1 HEAD \
            | grep '^docs/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=$SITES" >> $GITHUB_OUTPUT
          echo "Changed sites: $SITES"

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect-changes
    if: needs.detect-changes.outputs.sites != '[]' && needs.detect-changes.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.sites) }}
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy ${{ matrix.site }} via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SITE: ${{ matrix.site }}
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:ssl-protect-data yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror --reverse --verbose --delete \
              ./docs/$SITE/ /$SITE/;
            bye
          "
