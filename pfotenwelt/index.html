<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pfotenwelt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #4a8a32; overflow: hidden;
      position: fixed; top: 0; left: 0;
    }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      height: 36px;
      background: linear-gradient(180deg, rgba(20,12,30,0.75) 0%, rgba(20,12,30,0.4) 80%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      font-family: Georgia, serif; font-weight: bold; font-size: 15px;
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }
    #hud.visible { opacity: 1; }
    #hud-hearts { color: #ffaabb; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    #hud-day { color: #ffe088; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    #hud-level { color: #88ccff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <div id="hud">
    <span id="hud-hearts">❤️ 100</span>
    <span id="hud-day">☀️ Tag 1</span>
    <span id="hud-level">Lv.1</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
