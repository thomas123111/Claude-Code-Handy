stages:
  - merge
  - deploy

# Auto-merge claude/* branches into main
auto-merge:
  stage: merge
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^claude\//'
  script:
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@noreply.gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.ovh.flarandr.de/unserkunde-ai/gewerbe-homepages.git"
    - git fetch origin main
    - git checkout main
    - git merge --no-ff "$CI_COMMIT_SHA" -m "Auto-merge $CI_COMMIT_BRANCH into main"
    - git push origin main

# Deploy changed sites via FTP
ftp-deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - docs/**/*
  before_script:
    - apk add --no-cache lftp git
  script:
    - |
      # Find changed site folders
      SITES=$(git diff --name-only HEAD~1 HEAD \
        | grep '^docs/' \
        | cut -d'/' -f2 \
        | sort -u)

      if [ -z "$SITES" ]; then
        echo "No site changes detected, skipping deploy."
        exit 0
      fi

      echo "Changed sites: $SITES"

      for SITE in $SITES; do
        echo "Deploying $SITE..."
        lftp -c "
          set ftp:ssl-force true;
          set ssl:verify-certificate no;
          open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
          mirror --reverse --delete --verbose ./docs/${SITE}/ /${SITE}/;
          quit
        "
        echo "$SITE deployed successfully."
      done
